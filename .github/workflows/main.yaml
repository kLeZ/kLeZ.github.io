name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - "LICENSE"
      - "README.md"
  workflow_dispatch:

env:
  RUBY_VERSION: 3.2.0
  JEKYLL_ENV: 'production'
  NOKOGIRI_USE_SYSTEM_LIBRARIES: true

# Permessi necessari a deploy-pages: pubblicazione su GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola pubblicazione Pages alla volta, senza annullare i deploy in corso.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install nodejs

      - name: Clone repository
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }} # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Version info
        run: |
          ruby --version
          gem --version
          bundle --version

      - name: Building site
        run: |
          chmod +x ./_scripts/build
          ./_scripts/build
        env:
          JEKYLL_ENV: production
          NOKOGIRI_USE_SYSTEM_LIBRARIES: true
          COMMIT_SHA: "${{ github.sha }}"
          COMMIT_MESSAGE: "${{ github.event.head_commit.message }}"
          BUILD_NUMBER: "${{ github.run_number }}"
          BUILD_ID: "${{ github.run_id }}"
          BUILD_WEB_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Date-tag the build
        run: touch "_site/$(echo "deployed at `LANG=en_US date '+%a %b %d %H.%M.%S %Z %Y'` by GitHub Actions")"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
