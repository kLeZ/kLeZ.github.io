<form method="post" action="{{ include.post_url }}">
	<input name="options[redirect]" type="hidden" value="{{ page.url | absolute_url }}#comments">
	<input name="options[slug]" type="hidden" value="{{ page.slug }}">
	<div class="form-row">
		<div class="col form-group">
			<input type="text" id="username" name="fields[name]" class="form-control" placeholder="{% t comments.placeholders.username %}" required="true" />
		</div>
		<div class="col form-group">
			<input type="email" id="email" name="fields[email]" class="form-control" placeholder="{% t comments.placeholders.email %}" required="true" />
		</div>
		<div class="col form-group">
			<input type="text" id="url" name="fields[url]" class="form-control" placeholder="{% t comments.placeholders.website %}" />
		</div>
	</div>
	<div class="form-row">
		<div class="col form-group">
			<textarea id="message" name="fields[message]" rows="3" class="form-control" placeholder="{% t comments.placeholders.message %}" required="true"></textarea>
		</div>
	</div>
	<div class="form-row">
		<div class="col-sm-12 col-md-3 col-lg-2 form-group">
			<button type="submit" class="btn btn-primary">{% t comments.submit %}</button>
		</div>
		<div class="col form-group">
			<div class="alert alert-warning d-block small">{% t comments.moderation-warning %}</div>
		</div>
	</div>
</form>
